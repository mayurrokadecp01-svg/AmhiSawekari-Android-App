<main class="relative h-screen w-screen flex flex-col items-center justify-center bg-gradient-to-b from-[#ff9933] to-[#ffb84d]">

<div class="absolute bottom-[-10%] right-[-10%] opacity-10 rotate-12">

</div>

<div class="w-24 h-24 bg-white/20 backdrop-blur-xl rounded-full flex items-center justify-center shadow-2xl border border-white/30 mb-4">
<span class="material-symbols-outlined text-white text-5xl" style="font-variation-settings: 'FILL' 1;">

                </span>
</div>

<h1 class="font-headline text-5xl md:text-6xl font-extrabold text-white tracking-tight drop-shadow-md">

</div>

</div>
<!-- Footer Meta Text (Identity) -->
<div class="absolute bottom-8 text-white/40 font-label text-[10px] tracking-widest">
            V1.0.4 • भजन सेवा फाउंडेशन
        </div>

<div class="absolute top-20 left-10 w-64 h-64 bg-secondary-container/20 rounded-full blur-[100px]"></div>
